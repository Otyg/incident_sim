<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Incident Exercise Prototype</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4efe5;
        --panel: #fffdf8;
        --panel-alt: #f7f1e7;
        --ink: #1d2a2e;
        --muted: #5f6c6f;
        --accent: #0f766e;
        --accent-soft: #cfece6;
        --danger: #9f1239;
        --border: #d8cec0;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top, rgba(15, 118, 110, 0.12), transparent 28%),
          linear-gradient(180deg, #f7f2e8 0%, var(--bg) 100%);
      }

      .page {
        width: min(1180px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 32px 0 48px;
      }

      .hero {
        background: linear-gradient(135deg, rgba(15, 118, 110, 0.12), rgba(255, 253, 248, 0.96));
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 28px;
        box-shadow: 0 16px 40px rgba(29, 42, 46, 0.08);
      }

      .hero h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 3vw, 3.2rem);
        line-height: 1;
      }

      .hero p {
        margin: 0;
        color: var(--muted);
        max-width: 62ch;
      }

      .hero-top {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-start;
      }

      .hero-top .actions {
        margin-top: 0;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 20px;
      }

      button {
        border: none;
        border-radius: 999px;
        padding: 12px 18px;
        background: var(--ink);
        color: white;
        cursor: pointer;
        font: inherit;
      }

      button.secondary {
        background: var(--accent-soft);
        color: var(--ink);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      .grid {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 18px;
        margin-top: 18px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 8px 24px rgba(29, 42, 46, 0.06);
      }

      .panel.alt { background: var(--panel-alt); }

      .panel h2, .panel h3 {
        margin-top: 0;
      }

      .meta, .list {
        display: grid;
        gap: 10px;
      }

      .meta-item {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid rgba(216, 206, 192, 0.7);
      }

      .tag-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .tag {
        border-radius: 999px;
        background: var(--accent-soft);
        padding: 6px 10px;
        font-size: 0.95rem;
      }

      textarea {
        width: 100%;
        min-height: 120px;
        border-radius: 16px;
        border: 1px solid var(--border);
        padding: 14px;
        font: inherit;
        background: white;
      }

      select,
      input[type="file"] {
        width: 100%;
        border-radius: 16px;
        border: 1px solid var(--border);
        padding: 12px 14px;
        font: inherit;
        background: white;
        color: var(--ink);
      }

      .status {
        margin-top: 12px;
        padding: 12px 14px;
        border-radius: 14px;
        background: rgba(15, 118, 110, 0.08);
        color: var(--ink);
      }

      .error {
        background: rgba(159, 18, 57, 0.08);
        color: var(--danger);
      }

      .timeline-item {
        padding: 14px 0;
        border-top: 1px solid rgba(216, 206, 192, 0.7);
      }

      .timeline-item:first-child { border-top: none; padding-top: 0; }

      .small {
        color: var(--muted);
        font-size: 0.95rem;
      }

      .stack {
        display: grid;
        gap: 12px;
      }

      .page-header {
        display: grid;
        gap: 8px;
      }

      .page-header p {
        margin: 0;
        color: var(--muted);
        max-width: 62ch;
      }

      .section-title {
        margin-bottom: 10px;
      }

      @media (max-width: 900px) {
        .grid { grid-template-columns: 1fr; }
        .page { width: min(100vw - 20px, 1180px); padding-top: 20px; }
        .hero { padding: 22px; }
        .hero-top { display: grid; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useEffect, useState } = React;
      const TURN_RETRY_DELAYS_MS = [2000, 4000, 8000, 16000];

      class ApiError extends Error {
        constructor(message, { status, body } = {}) {
          super(message);
          this.name = "ApiError";
          this.status = status;
          this.body = body || null;
        }
      }

      function sleep(ms) {
        return new Promise((resolve) => window.setTimeout(resolve, ms));
      }

      function getErrorMessage(error) {
        if (error instanceof ApiError) {
          if (typeof error.body?.detail === "string") {
            return error.body.detail;
          }

          if (Array.isArray(error.body?.detail)) {
            return error.body.detail
              .map((item) => item?.msg || item?.message || JSON.stringify(item))
              .join(" | ");
          }
        }

        if (error instanceof Error && typeof error.message === "string") {
          return error.message;
        }

        if (typeof error === "string") {
          return error;
        }

        try {
          return JSON.stringify(error);
        } catch {
          return "Ett okänt fel inträffade.";
        }
      }

      async function readJsonFile(file) {
        const content = await file.text();

        try {
          return JSON.parse(content);
        } catch {
          throw new Error("Filen innehåller inte giltig JSON.");
        }
      }

      async function apiRequest(path, options = {}) {
        const { headers: optionHeaders = {}, ...restOptions } = options;

        const response = await fetch(path, {
          ...restOptions,
          headers: {
            "Content-Type": "application/json",
            ...optionHeaders,
          },
        });

        const isJson = response.headers.get("content-type")?.includes("application/json");
        const body = isJson ? await response.json() : null;

        if (!response.ok) {
          throw new ApiError(body?.detail || `Request failed: ${response.status}`, {
            status: response.status,
            body,
          });
        }

        return body;
      }

      function App() {
        const [currentPage, setCurrentPage] = useState("setup");
        const [scenario, setScenario] = useState(null);
        const [availableScenarios, setAvailableScenarios] = useState([]);
        const [selectedScenarioId, setSelectedScenarioId] = useState("");
        const [session, setSession] = useState(null);
        const [timeline, setTimeline] = useState([]);
        const [latestNarration, setLatestNarration] = useState(null);
        const [debrief, setDebrief] = useState(null);
        const [participantInput, setParticipantInput] = useState("");
        const [selectedManualPhase, setSelectedManualPhase] = useState("");
        const [selectedManualInjectId, setSelectedManualInjectId] = useState("");
        const [loading, setLoading] = useState(false);
        const [status, setStatus] = useState("");
        const [error, setError] = useState("");

        const currentTurnScenarioEvents = session
          ? session.exercise_log.filter(
              (item) =>
                item.turn === session.turn_number &&
                (item.type === "scenario_event" || item.type === "phase_change")
            )
          : [];
        const sessionEventLog = session
          ? session.exercise_log
              .filter((item) => item.type !== "participant_action")
              .slice()
              .reverse()
          : [];
        const availableScenarioPhases = scenario
          ? (scenario.states || [])
              .map((state) => state.phase)
              .filter((phase, index, items) => phase && items.indexOf(phase) === index)
          : [];
        const availableManualInjects = scenario?.inject_catalog || [];
        const activeInjectDetails = session
          ? session.active_injects.map((injectId) => {
              const definition = availableManualInjects.find((item) => item.id === injectId);
              return (
                definition || {
                  id: injectId,
                  title: injectId,
                  type: "okand",
                  description: "Ingen inject-beskrivning hittades i scenariots katalog.",
                }
              );
            })
          : [];

        const getPreferredManualInjectId = (scenarioState, sessionState) => {
          const injects = scenarioState?.inject_catalog || [];
          if (injects.length === 0) {
            return "";
          }

          const activeInjects = sessionState?.active_injects || [];
          const availableInject = injects.find((item) => !activeInjects.includes(item.id));
          return availableInject?.id || injects[0]?.id || "";
        };

        const loadTimeline = async (sessionId) => {
          const items = await apiRequest(`/sessions/${sessionId}/timeline`);
          setTimeline(items);
        };

        const refreshScenarioList = async (options = {}) => {
          const items = await apiRequest("/scenarios");
          setAvailableScenarios(items);

          if (items.length === 0) {
            setSelectedScenarioId("");
            return items;
          }

          if (options.preferredScenarioId) {
            const matchingScenario = items.find((item) => item.id === options.preferredScenarioId);
            if (matchingScenario) {
              setSelectedScenarioId(matchingScenario.id);
              return items;
            }
          }

          setSelectedScenarioId((currentValue) => {
            if (currentValue && items.some((item) => item.id === currentValue)) {
              return currentValue;
            }

            return items[0].id;
          });

          return items;
        };

        const resetSessionView = () => {
          setSession(null);
          setTimeline([]);
          setLatestNarration(null);
          setDebrief(null);
          setParticipantInput("");
          setSelectedManualPhase("");
          setSelectedManualInjectId("");
        };

        const loadScenario = async () => {
          setLoading(true);
          setError("");
          setStatus("Laddar exempelscenario...");

          try {
            const sampleScenario = await apiRequest("/sample-scenarios/default");
            const savedScenario = await apiRequest("/scenarios", {
              method: "POST",
              body: JSON.stringify(sampleScenario),
            });
            setScenario(savedScenario);
            resetSessionView();
            await refreshScenarioList({ preferredScenarioId: savedScenario.id });
            setStatus("Exempelscenario laddat och sparat.");
          } catch (err) {
            try {
              const fallbackScenario = await apiRequest("/sample-scenarios/default");
              const existing = await apiRequest(`/scenarios/${fallbackScenario.id}`);
              setScenario(existing);
              resetSessionView();
              await refreshScenarioList({ preferredScenarioId: existing.id });
              setStatus("Befintligt exempelscenario laddat från databasen.");
            } catch {
              setError(getErrorMessage(err));
              setStatus("");
            }
          } finally {
            setLoading(false);
          }
        };

        const loadScenarioFromDatabase = async () => {
          if (!selectedScenarioId) return;

          setLoading(true);
          setError("");
          setStatus("Laddar scenario från databasen...");

          try {
            const loadedScenario = await apiRequest(`/scenarios/${selectedScenarioId}`);
            setScenario(loadedScenario);
            resetSessionView();
            setStatus(`Scenario "${loadedScenario.title}" laddat från databasen.`);
          } catch (err) {
            setError(getErrorMessage(err));
            setStatus("");
          } finally {
            setLoading(false);
          }
        };

        const handleScenarioUpload = async (event) => {
          const file = event.target.files?.[0];
          event.target.value = "";

          if (!file) {
            return;
          }

          setLoading(true);
          setError("");
          setStatus(`Läser in ${file.name}...`);

          try {
            const payload = await readJsonFile(file);
            const savedScenario = await apiRequest("/scenarios", {
              method: "POST",
              body: JSON.stringify(payload),
            });
            setScenario(savedScenario);
            resetSessionView();
            await refreshScenarioList({ preferredScenarioId: savedScenario.id });
            setStatus(`Scenario "${savedScenario.title}" uppladdat och sparat.`);
          } catch (err) {
            setError(getErrorMessage(err));
            setStatus("");
          } finally {
            setLoading(false);
          }
        };

        const startSession = async () => {
          if (!scenario) return;
          setLoading(true);
          setError("");
          setStatus("Startar session...");

          try {
            const created = await apiRequest("/sessions", {
              method: "POST",
              body: JSON.stringify({
                scenario_id: scenario.id,
                audience: "krisledning",
              }),
            });
            setSession(created.session_state);
            setSelectedManualPhase(created.session_state.phase);
            setSelectedManualInjectId(getPreferredManualInjectId(scenario, created.session_state));
            setTimeline([]);
            setLatestNarration(created.initial_narration);
            setDebrief(null);
            setStatus("Session startad. Initial lägesbild är klar.");
            setCurrentPage("session");
            await loadTimeline(created.session_state.session_id);
          } catch (err) {
            setError(getErrorMessage(err));
            setStatus("");
          } finally {
            setLoading(false);
          }
        };

        const changePhaseManually = async () => {
          if (!session || session.status !== "active" || !selectedManualPhase) return;

          setLoading(true);
          setError("");
          setStatus("Byter fas manuellt...");

          try {
            const updated = await apiRequest(`/sessions/${session.session_id}/phase`, {
              method: "POST",
              body: JSON.stringify({ phase: selectedManualPhase }),
            });
            setSession(updated.session_state);
            setLatestNarration(updated.narration);
            setStatus(`Fasen är nu ${updated.session_state.phase}. Lägesbilden är uppdaterad.`);
          } catch (err) {
            setError(getErrorMessage(err));
            setStatus("");
          } finally {
            setLoading(false);
          }
        };

        const triggerInjectManually = async () => {
          if (!session || session.status !== "active" || !selectedManualInjectId) return;

          setLoading(true);
          setError("");
          setStatus("Triggar inject manuellt...");

          try {
            const updatedSession = await apiRequest(`/sessions/${session.session_id}/injects`, {
              method: "POST",
              body: JSON.stringify({ inject_id: selectedManualInjectId }),
            });
            const injectTitle =
              availableManualInjects.find((item) => item.id === selectedManualInjectId)?.title ||
              selectedManualInjectId;
            setSession(updatedSession);
            setSelectedManualInjectId(getPreferredManualInjectId(scenario, updatedSession));
            setStatus(`Injectet "${injectTitle}" är nu aktivt.`);
          } catch (err) {
            setError(getErrorMessage(err));
            setStatus("");
          } finally {
            setLoading(false);
          }
        };

        const submitTurn = async (event) => {
          event.preventDefault();
          if (!session || session.status !== "active" || !participantInput.trim()) return;

          const submittedInput = participantInput.trim();
          const maxAttempts = TURN_RETRY_DELAYS_MS.length + 1;

          setLoading(true);
          setError("");
          setStatus("Skickar deltagaråtgärd...");

          try {
            let turn = null;

            for (let attempt = 1; attempt <= maxAttempts; attempt += 1) {
              try {
                setStatus(
                  attempt === 1
                    ? "Skickar deltagaråtgärd..."
                    : `Försök ${attempt} av ${maxAttempts}: försöker skicka deltagaråtgärden igen...`
                );

                turn = await apiRequest(`/sessions/${session.session_id}/turns`, {
                  method: "POST",
                  headers: {
                    "X-Retry-Attempt": String(attempt),
                    "X-Retry-Max-Attempts": String(maxAttempts),
                  },
                  body: JSON.stringify({ participant_input: submittedInput }),
                });
                break;
              } catch (err) {
                const retryable = err instanceof ApiError && err.body?.retryable === true;
                const hasAttemptsLeft = attempt < maxAttempts;

                if (!retryable || !hasAttemptsLeft) {
                  throw err;
                }

                const retryAfterSeconds =
                  err.body?.retry_after_seconds ||
                  TURN_RETRY_DELAYS_MS[Math.min(attempt - 1, TURN_RETRY_DELAYS_MS.length - 1)] / 1000;
                const providerMessage =
                  err.body?.detail || "LLM-provider svarade med ett serverfel.";
                setError(providerMessage);
                setStatus(
                  `${providerMessage} Nytt försök om ${retryAfterSeconds} sekunder...`
                );
                await sleep(retryAfterSeconds * 1000);
              }
            }

            if (!turn) {
              throw new Error("Turn kunde inte sparas efter flera försök.");
            }

            setSession(turn.state_snapshot);
            setLatestNarration(turn.narrator_response);
            setParticipantInput("");
            setError("");
            setStatus("Turn sparad och lägesbild uppdaterad.");
            await loadTimeline(session.session_id);
          } catch (err) {
            if (err instanceof ApiError && err.body?.retryable) {
              setError(
                err.body?.detail ||
                  "LLM-provider svarade fortsatt med serverfel efter alla försök."
              );
            } else {
              setError(getErrorMessage(err));
            }
            setStatus("");
          } finally {
            setLoading(false);
          }
        };

        const completeScenario = async () => {
          if (!session || session.status !== "active") return;

          setLoading(true);
          setError("");
          setStatus("Avslutar scenario och skapar debriefingunderlag...");

          try {
            const completed = await apiRequest(`/sessions/${session.session_id}/complete`, {
              method: "POST",
            });
            setSession(completed.session_state);
            setDebrief(completed.debrief);
            setStatus("Scenario avslutat. Debriefingunderlaget ar klart.");
          } catch (err) {
            setError(getErrorMessage(err));
            setStatus("");
          } finally {
            setLoading(false);
          }
        };

        useEffect(() => {
          const initialize = async () => {
            setLoading(true);
            setError("");
            setStatus("Hämtar scenarion...");

            try {
              const items = await refreshScenarioList();
              if (items.length > 0) {
                setScenario(items[0]);
                setStatus(`Hittade ${items.length} sparade scenarion i databasen.`);
              } else {
                setStatus("Inga sparade scenarion hittades. Ladda exempelscenario eller ladda upp en JSON-fil.");
              }
            } catch (err) {
              setError(getErrorMessage(err));
              setStatus("");
            } finally {
              setLoading(false);
            }
          };

          initialize();
        }, []);

        useEffect(() => {
          if (session?.phase) {
            setSelectedManualPhase(session.phase);
          }
        }, [session?.phase]);

        useEffect(() => {
          setSelectedManualInjectId((currentValue) => {
            const injects = scenario?.inject_catalog || [];
            if (injects.length === 0) {
              return "";
            }

            const activeInjects = session?.active_injects || [];
            if (currentValue && injects.some((item) => item.id === currentValue)) {
              return currentValue;
            }

            const availableInject = injects.find((item) => !activeInjects.includes(item.id));
            return availableInject?.id || injects[0]?.id || "";
          });
        }, [scenario, session?.active_injects]);

        const renderScenarioOverview = () => (
          <article className="panel">
            <h2>Scenarioöversikt</h2>
            {scenario ? (
              <div className="list">
                <div>
                  <strong>{scenario.title}</strong>
                  <div className="small">{scenario.description}</div>
                </div>
                <div className="meta">
                  <div className="meta-item"><span>Version</span><strong>{scenario.version}</strong></div>
                  <div className="meta-item"><span>Svårighet</span><strong>{scenario.difficulty}</strong></div>
                  <div className="meta-item"><span>Tidsram</span><strong>{scenario.timebox_minutes} min</strong></div>
                  <div className="meta-item"><span>Datadrivna regler</span><strong>{scenario.executable_rules?.length || 0}</strong></div>
                </div>
                <div>
                  <div className="small">Mål</div>
                  <div className="tag-row">
                    {scenario.training_goals.map((goal) => <span key={goal} className="tag">{goal}</span>)}
                  </div>
                </div>
              </div>
            ) : (
              <div className="small">Inget scenario laddat ännu.</div>
            )}
          </article>
        );

        const renderSetupPage = () => (
          <>
            <section className="hero">
              <div className="hero-top">
                <div className="page-header">
                  <h1>Scenariohantering</h1>
                  <p>
                    Läs in exempelscenario, välj ett sparat scenario från databasen eller ladda upp ett nytt scenario i JSON-format.
                  </p>
                </div>
              </div>
              <div className="actions">
                <button onClick={loadScenario} disabled={loading}>Ladda scenario</button>
                <button
                  className="secondary"
                  onClick={loadScenarioFromDatabase}
                  disabled={loading || !selectedScenarioId}
                >
                  Ladda från databasen
                </button>
                <button className="secondary" onClick={startSession} disabled={loading || !scenario}>
                  Starta session
                </button>
              </div>
              <div className="stack">
                <div>
                  <div className="small">Sparade scenarion</div>
                  <select
                    value={selectedScenarioId}
                    onChange={(event) => setSelectedScenarioId(event.target.value)}
                    disabled={loading || availableScenarios.length === 0}
                  >
                    {availableScenarios.length === 0 ? (
                      <option value="">Inga sparade scenarion</option>
                    ) : (
                      availableScenarios.map((item) => (
                        <option key={item.id} value={item.id}>
                          {item.title} ({item.id})
                        </option>
                      ))
                    )}
                  </select>
                </div>
                <div>
                  <div className="small">Ladda upp scenario i JSON-format</div>
                  <input
                    type="file"
                    accept=".json,application/json"
                    onChange={handleScenarioUpload}
                    disabled={loading}
                  />
                </div>
              </div>
              {status && <div className="status">{status}</div>}
              {error && <div className="status error">{error}</div>}
            </section>

            <section className="grid">
              {renderScenarioOverview()}
            </section>
          </>
        );

        const renderSessionPage = () => (
          <>
            <section className="hero">
              <div className="hero-top">
                <div className="page-header">
                  <h1>Aktiv session</h1>
                  <p>
                    Använd den initiala lägesbilden direkt när sidan öppnas och fortsätt sedan övningen med nya deltagaråtgärder.
                  </p>
                </div>
                <div className="actions">
                  <button className="secondary" onClick={() => setCurrentPage("setup")} disabled={loading}>
                    Till scenarioöversikt
                  </button>
                  <button
                    onClick={completeScenario}
                    disabled={loading || !session || session.status !== "active"}
                  >
                    Avsluta scenario
                  </button>
                </div>
              </div>
              {status && <div className="status">{status}</div>}
              {error && <div className="status error">{error}</div>}
            </section>

            <section className="grid">
              <article className="panel alt">
                <h2>Senaste lägesbild</h2>
                {latestNarration ? (
                  <div className="list">
                    {session?.turn_number === 0 && scenario?.background?.context && (
                      <div>
                        <div className="small">Bakgrundskontext</div>
                        <div>{scenario.background.context}</div>
                      </div>
                    )}
                    <div>{latestNarration.situation_update}</div>
                    {currentTurnScenarioEvents.length > 0 && (
                      <div>
                        <div className="small">Vad ändrades denna turn</div>
                        <div className="list">
                          {currentTurnScenarioEvents.map((item, index) => (
                            <div key={`${item.type}-${index}`}>- {item.text}</div>
                          ))}
                        </div>
                      </div>
                    )}
                    <div>
                      <div className="small">Nyckelpunkter</div>
                      <div className="tag-row">
                        {latestNarration.key_points.map((point) => <span key={point} className="tag">{point}</span>)}
                      </div>
                    </div>
                    <div>
                      <div className="small">Beslut att överväga</div>
                      <div className="list">
                        {latestNarration.decisions_to_consider.map((item) => <div key={item}>- {item}</div>)}
                      </div>
                    </div>
                  </div>
                ) : (
                  <div className="small">Ingen lägesbild ännu.</div>
                )}
              </article>

              <article className="panel">
                <h2>Deltagaråtgärd och kontrollpanel</h2>
                <form onSubmit={submitTurn}>
                  <textarea
                    value={participantInput}
                    onChange={(event) => setParticipantInput(event.target.value)}
                    disabled={loading || session?.status !== "active"}
                    placeholder="Beskriv nästa åtgärd, till exempel: Vi stänger extern VPN och förbereder ett första uttalande."
                  />
                  <div className="actions">
                    <button
                      type="submit"
                      disabled={loading || !session || session.status !== "active" || !participantInput.trim()}
                    >
                      Skicka turn
                    </button>
                  </div>
                </form>
                {session && (
                  <div className="stack" style={{ marginTop: "16px" }}>
                    {availableScenarioPhases.length > 1 && (
                      <div className="stack">
                        <div>
                          <div className="small">Manuellt fasbyte</div>
                          <select
                            value={selectedManualPhase || session.phase}
                            onChange={(event) => setSelectedManualPhase(event.target.value)}
                            disabled={loading || session.status !== "active"}
                          >
                            {availableScenarioPhases.map((phase) => (
                              <option key={phase} value={phase}>
                                {phase}
                              </option>
                            ))}
                          </select>
                        </div>
                        <div className="actions">
                          <button
                            className="secondary"
                            onClick={changePhaseManually}
                            disabled={
                              loading ||
                              session.status !== "active" ||
                              !selectedManualPhase ||
                              selectedManualPhase === session.phase
                            }
                          >
                            Byt fas
                          </button>
                        </div>
                      </div>
                    )}
                    {availableManualInjects.length > 0 && (
                      <div className="stack">
                        <div>
                          <div className="small">Manuellt inject</div>
                          <select
                            value={selectedManualInjectId}
                            onChange={(event) => setSelectedManualInjectId(event.target.value)}
                            disabled={loading || session.status !== "active"}
                          >
                            {availableManualInjects.map((inject) => (
                              <option key={inject.id} value={inject.id}>
                                {inject.title} ({inject.type})
                              </option>
                            ))}
                          </select>
                        </div>
                        <div className="actions">
                          <button
                            className="secondary"
                            onClick={triggerInjectManually}
                            disabled={
                              loading ||
                              session.status !== "active" ||
                              !selectedManualInjectId ||
                              session.active_injects.includes(selectedManualInjectId)
                            }
                          >
                            Trigga inject
                          </button>
                        </div>
                      </div>
                    )}
                  </div>
                )}
                {session?.status === "completed" && (
                  <div className="small">
                    Sessionen är avslutad. Nya deltagaråtgärder kan inte längre skickas.
                  </div>
                )}
              </article>
            </section>

            <section className="grid">
              <article className="panel alt">
                <h2>Aktuell session</h2>
                {session ? (
                  <div className="meta">
                    <div className="meta-item"><span>Session</span><strong>{session.session_id}</strong></div>
                    <div className="meta-item"><span>Scenario</span><strong>{session.scenario_id}</strong></div>
                    <div className="meta-item"><span>Fas</span><strong>{session.phase}</strong></div>
                    <div className="meta-item"><span>Tid</span><strong>{session.current_time}</strong></div>
                    <div className="meta-item"><span>Turn</span><strong>{session.turn_number}</strong></div>
                    <div className="meta-item"><span>Påverkansnivå</span><strong>{session.metrics.impact_level}</strong></div>
                    <div className="meta-item"><span>Medietryck</span><strong>{session.metrics.media_pressure}</strong></div>
                    <div className="meta-item"><span>Störning</span><strong>{session.metrics.service_disruption}</strong></div>
                    <div className="meta-item">
                      <span>Aktiva injects</span>
                      <strong>{session.active_injects.length > 0 ? session.active_injects.join(", ") : "Inga"}</strong>
                    </div>
                  </div>
                ) : (
                  <div className="small">Ingen aktiv session ännu.</div>
                )}
              </article>

              <article className="panel">
                <h2>Aktiva injects</h2>
                {session ? (
                  activeInjectDetails.length > 0 ? (
                    <div className="list">
                      {activeInjectDetails.map((inject) => (
                        <div key={inject.id} className="timeline-item">
                          <strong>{inject.title}</strong>
                          <div className="small">{inject.type} · {inject.id}</div>
                          <div>{inject.description}</div>
                        </div>
                      ))}
                    </div>
                  ) : (
                    <div className="small">
                      Inga aktiva injects just nu.
                    </div>
                  )
                ) : (
                  <div className="small">Ingen aktiv session ännu.</div>
                )}
              </article>
            </section>

            <section className="grid">
              <article className="panel">
                <h2>Turn-tidslinje</h2>
                {timeline.length > 0 ? (
                  <div className="list">
                    {timeline
                      .slice()
                      .reverse()
                      .map((turn) => {
                        return (
                          <div key={turn.turn_number} className="timeline-item">
                            <strong>
                              Turn {turn.turn_number} · {turn.state_snapshot.current_time}
                            </strong>
                            <div>{turn.participant_input}</div>
                          </div>
                        );
                      })}
                  </div>
                ) : session ? (
                  <div className="small">
                    Inga turns spelade ännu. Turn-tidslinjen visas här när övningen går vidare.
                  </div>
                ) : (
                  <div className="small">Ingen aktiv session ännu.</div>
                )}
              </article>

              <article className="panel">
                <h2>System- och scenariohändelser</h2>
                {sessionEventLog.length > 0 ? (
                  <div className="list">
                    {sessionEventLog.map((item, index) => (
                      <div key={`${item.turn}-${item.type}-${index}`} className="timeline-item">
                        <strong>
                          Turn {item.turn} · {item.type}
                        </strong>
                        <div>{item.text}</div>
                      </div>
                    ))}
                  </div>
                ) : session ? (
                  <div className="small">
                    Inga system- eller scenariohändelser loggade ännu.
                  </div>
                ) : (
                  <div className="small">Ingen aktiv session ännu.</div>
                )}
              </article>
            </section>

            {debrief && (
              <section className="grid">
                <article className="panel">
                  <h2 className="section-title">Summering av tidslinjen</h2>
                  <div className="list">
                    <div>{debrief.exercise_summary}</div>
                    {debrief.timeline_summary.map((item) => (
                      <div key={item.turn_number} className="timeline-item">
                        <strong>Turn {item.turn_number}: {item.summary}</strong>
                        <div>{item.outcome}</div>
                      </div>
                    ))}
                  </div>
                </article>

                <article className="panel alt">
                  <h2 className="section-title">Debriefingunderlag</h2>
                  <div className="list">
                    <div>
                      <div className="small">Styrkor</div>
                      <div className="list">
                        {debrief.strengths.map((item) => <div key={item}>- {item}</div>)}
                      </div>
                    </div>
                    <div>
                      <div className="small">Utvecklingsområden</div>
                      <div className="list">
                        {debrief.development_areas.map((item) => <div key={item}>- {item}</div>)}
                      </div>
                    </div>
                    <div>
                      <div className="small">Debriefingfrågor</div>
                      <div className="list">
                        {debrief.debrief_questions.map((item) => <div key={item}>- {item}</div>)}
                      </div>
                    </div>
                    {debrief.recommended_follow_ups.length > 0 && (
                      <div>
                        <div className="small">Föreslagna uppföljningar</div>
                        <div className="list">
                          {debrief.recommended_follow_ups.map((item) => <div key={item}>- {item}</div>)}
                        </div>
                      </div>
                    )}
                    <div>
                      <div className="small">Facilitatornotering</div>
                      <div>{debrief.facilitator_notes}</div>
                    </div>
                  </div>
                </article>
              </section>
            )}
          </>
        );

        return (
          <div className="page">
            {currentPage === "setup" ? renderSetupPage() : renderSessionPage()}
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
