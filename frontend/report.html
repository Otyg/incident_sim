<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scenariorapport</title>
    <link rel="stylesheet" href="/frontend/styles.css" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="/frontend/common.js"></script>
  </head>
  <body>
    <div class="page">
      <nav class="nav">
        <a class="nav-link" href="/setup">Scenariohantering</a>
        <a class="nav-link" href="/authoring">Scenarioförfattning</a>
        <a class="nav-link" href="/session">Aktiv session</a>
        <a class="nav-link current" href="/report">Rapport</a>
      </nav>
      <div id="root"></div>
    </div>
    <script type="text/babel">
      const { useEffect, useState } = React;
      const Common = window.IncidentSimCommon;

      function ReportPage() {
        const [sessionId, setSessionId] = useState("");
        const [reportHtml, setReportHtml] = useState("");
        const [loading, setLoading] = useState(false);
        const [status, setStatus] = useState("");
        const [error, setError] = useState("");

        useEffect(() => {
          const currentSessionId = Common.getCurrentSessionId();
          if (!currentSessionId) {
            setStatus("Ingen avslutad session hittades. Avsluta ett scenario först.");
            return;
          }

          setSessionId(currentSessionId);
          setLoading(true);
          setError("");
          setStatus("Laddar rapport...");

          fetch(`/sessions/${currentSessionId}/report.html`)
            .then(async (response) => {
              const html = await response.text();
              if (!response.ok) {
                let message = `Request failed: ${response.status}`;
                try {
                  const parsed = JSON.parse(html);
                  message = parsed?.detail || message;
                } catch {}
                throw new Error(message);
              }

              const parser = new window.DOMParser();
              const documentNode = parser.parseFromString(html, "text/html");
              const article =
                documentNode.querySelector("article.report-text") ||
                documentNode.querySelector("article") ||
                documentNode.body;

              setReportHtml(article.innerHTML);
              setStatus("Rapporten är klar.");
              const query = new URLSearchParams(window.location.search);
              if (query.get("print") === "1") {
                window.location.assign(`/sessions/${currentSessionId}/report.pdf`);
              }
            })
            .catch((err) => {
              setError(Common.getErrorMessage(err));
              setStatus("");
              setReportHtml("");
            })
            .finally(() => setLoading(false));
        }, []);

        const reportMarkdownUrl = sessionId ? `/sessions/${sessionId}/report.md` : "";
        const reportPdfUrl = sessionId ? `/sessions/${sessionId}/report.pdf` : "";

        return (
          <div className="report-shell">
            <section className="hero">
              <div className="hero-top">
                <div className="report-header">
                  <h1>Scenariorapport</h1>
                  <p>
                    Rapporten genereras och lagras som Markdown. Visning i webbläsaren
                    och PDF-export renderas via pandoc i backend.
                  </p>
                </div>
                <div className="actions">
                  <a className="button-link secondary" href="/session">
                    Till sessionen
                  </a>
                  <a
                    className={`button-link secondary ${!sessionId ? "disabled-link" : ""}`}
                    href={sessionId ? reportMarkdownUrl : "#"}
                    aria-disabled={!sessionId}
                  >
                    Hämta Markdown
                  </a>
                  <a
                    className={`button-link ${!sessionId ? "disabled-link" : ""}`}
                    href={sessionId ? reportPdfUrl : "#"}
                    aria-disabled={!sessionId}
                  >
                    Exportera PDF
                  </a>
                </div>
              </div>
              {status && <div className="status">{status}</div>}
              {error && <div className="status error">{error}</div>}
            </section>

            {sessionId && !error && reportHtml && (
              <section
                className="panel report-text markdown-content"
                dangerouslySetInnerHTML={{ __html: reportHtml }}
              />
            )}

            {!sessionId && !error && !loading && (
              <section className="panel">
                <div className="small">
                  Ingen rapport finns tillgänglig än. Slutför en session för att skapa en
                  Markdown-rapport.
                </div>
              </section>
            )}

            {sessionId && !error && !loading && !reportHtml && (
              <section className="panel">
                <div className="small">Rapporten kunde inte visas.</div>
              </section>
            )}
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<ReportPage />);
    </script>
  </body>
</html>
